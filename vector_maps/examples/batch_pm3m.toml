# Batch analysis of the Pm3m hkl-110 tilt series (abtem out_full).
#   run the sweep:  python vmap_sweep.py --config examples/batch_pm3m.toml
#   (root is walked recursively in-process; or pre-build with `vmap_manifest.py <root>` and set path=)

[manifest]
root = "path"   # walked recursively -> one manifest spanning the tree

[fit]
config = "examples/fit_pm3m.toml"   # per-frame config; io.folder/io.fname set per row

[run]
retries = 1


[filter]                            # select the phonon-averaged HAADF, 0.25-blur slice
detector   = "haadf"
is_fph     = true
scan_s     = 50.0
thickness  = 50.0
borders    = 5.0
phonons    = 8
fph_sigma  = 0.1
blur_sigma = 0.25
